<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Centre Family Getaway 2026</title>
    <style>
        /* CSS FOR STYLING */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 { margin-bottom: 5px; font-size: 2.5rem; }
        h3 { margin-top: 0; font-weight: 300; color: #ddd; }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .time-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 80px;
        }
        .time-box span { display: block; font-size: 2.5rem; font-weight: bold; }
        .time-box label { font-size: 0.8rem; text-transform: uppercase; color: #bbb; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CONTACT CENTRE FAMILY GETAWAY</h1>
        <h3>Earl’s Regency, Kandy • June 27, 2026</h3>
        
        <div class="countdown">
            <div class="time-box"><span id="days">00</span><label>Days</label></div>
            <div class="time-box"><span id="hours">00</span><label>Hours</label></div>
            <div class="time-box"><span id="minutes">00</span><label>Mins</label></div>
            <div class="time-box"><span id="seconds">00</span><label>Secs</label></div>
        </div>
    </div>

    <script>
        // JAVASCRIPT FOR COUNTDOWN LOGIC
        // Set the event date (June 27, 2026 at 07:00 AM)
        const targetDate = new Date("June 27, 2026 07:00:00").getTime();

        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Display the results
            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

            // If countdown is finished
            if (difference < 0) {
                clearInterval(updateCountdown);
                document.querySelector(".countdown").innerHTML = "<h2>The Getaway Has Begun! 🎉</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
